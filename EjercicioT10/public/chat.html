<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chat en Tiempo Real</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
	<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body class="bg-light">
	<div class="container-fluid py-3">
		<div class="row">
			<div class="col-md-3">
				<div class="card mb-3">
					<div class="card-header">Salas</div>
					<ul class="list-group list-group-flush" id="rooms"></ul>
					<div class="card-body">
						<form id="createRoomForm" class="d-flex gap-2">
							<input type="text" id="roomName" class="form-control" placeholder="Nueva sala" required>
							<button class="btn btn-success" type="submit">+</button>
						</form>
					</div>
				</div>
				<div class="card">
					<div class="card-header">Usuarios en sala</div>
					<ul class="list-group list-group-flush" id="users"></ul>
				</div>
			</div>
			<div class="col-md-9">
				<div class="card h-100">
					<div class="card-header d-flex justify-content-between align-items-center">
						<span id="currentRoom">Selecciona una sala</span>
						<button class="btn btn-outline-danger btn-sm" id="logout">Salir</button>
					</div>
					<div class="card-body overflow-auto" style="height: 60vh;" id="messages"></div>
					<div class="card-footer">
						<form id="messageForm" class="d-flex gap-2">
							<input type="text" id="messageInput" class="form-control" placeholder="Escribe un mensaje..." autocomplete="off" required>
							<button class="btn btn-primary" type="submit">Enviar</button>
						</form>
						<div id="typing" class="text-muted small mt-1"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		// Autenticación
		const token = localStorage.getItem('token');
		if (!token) window.location.href = '/index.html';

		const socket = io({
			auth: { token }
		});

		let currentRoom = null;
		let typingTimeout;

		// Salas
		function loadRooms() {
			socket.emit('room:list');
		}
		socket.on('room:list', rooms => {
			const ul = document.getElementById('rooms');
			ul.innerHTML = '';
			rooms.forEach(room => {
				const li = document.createElement('li');
				li.className = 'list-group-item list-group-item-action' + (room._id === currentRoom ? ' active' : '');
				li.textContent = room.name;
				li.onclick = () => joinRoom(room._id, room.name);
				ul.appendChild(li);
			});
		});

		// Crear sala
		document.getElementById('createRoomForm').onsubmit = e => {
			e.preventDefault();
			const name = document.getElementById('roomName').value;
			socket.emit('room:create', { name });
			document.getElementById('roomName').value = '';
		};
		socket.on('room:created', room => {
			loadRooms();
		});

		// Unirse a sala
		function joinRoom(roomId, roomName) {
			if (currentRoom) socket.emit('room:leave', { roomId: currentRoom });
			currentRoom = roomId;
			document.getElementById('currentRoom').textContent = roomName;
			document.getElementById('messages').innerHTML = '';
			socket.emit('room:join', { roomId });
			socket.emit('room:users', { roomId });
		}
		socket.on('room:joined', ({ room, users, messages }) => {
			renderUsers(users);
			renderMessages(messages);
		});
		socket.on('room:user-joined', ({ user }) => {
			addSystemMessage(`${user.name} se ha unido a la sala`);
			socket.emit('room:users', { roomId: currentRoom });
		});
		socket.on('room:user-left', ({ user }) => {
			addSystemMessage(`${user.name} ha salido de la sala`);
			socket.emit('room:users', { roomId: currentRoom });
		});

		// Usuarios en sala
		socket.on('room:users', renderUsers);
		function renderUsers(users) {
			const ul = document.getElementById('users');
			ul.innerHTML = '';
			users.forEach(u => {
				const li = document.createElement('li');
				li.className = 'list-group-item';
				li.textContent = u?.name || 'Desconocido';
				ul.appendChild(li);
			});
		}

		// Mensajes
		socket.on('chat:message', ({ user, content, timestamp }) => {
			addMessage(user.name, content, timestamp);
		});
		function renderMessages(messages) {
			messages.forEach(m => addMessage(m.user?.name || 'Desconocido', m.content, m.createdAt));
		}
		function addMessage(user, text, time) {
			const div = document.getElementById('messages');
			const date = time ? new Date(time).toLocaleTimeString() : '';
			div.innerHTML += `<div><b>${user}</b> <span class="text-muted small">${date}</span><br>${text}</div>`;
			div.scrollTop = div.scrollHeight;
		}
		function addSystemMessage(text) {
			const div = document.getElementById('messages');
			div.innerHTML += `<div class="text-secondary small">${text}</div>`;
			div.scrollTop = div.scrollHeight;
		}

		// Enviar mensaje
		document.getElementById('messageForm').onsubmit = e => {
			e.preventDefault();
			const input = document.getElementById('messageInput');
			if (currentRoom && input.value) {
				socket.emit('chat:message', { roomId: currentRoom, content: input.value });
				input.value = '';
			}
		};

		// Indicador escribiendo
		let typing = false;
		let typingTimer;
		const TYPING_INTERVAL = 1200;

		document.getElementById('messageInput').addEventListener('input', () => {
			if (!currentRoom) return;
			if (!typing) {
				typing = true;
				socket.emit('chat:typing', { roomId: currentRoom });
			}
			clearTimeout(typingTimer);
			typingTimer = setTimeout(() => {
				typing = false;
				socket.emit('chat:stopTyping', { roomId: currentRoom });
			}, TYPING_INTERVAL);
		});

		socket.on('chat:typing', ({ user }) => {
			showTyping(`${user.name} está escribiendo...`);
		});
		socket.on('chat:stopTyping', ({ user }) => {
			clearTyping();
		});

		function showTyping(text) {
			const el = document.getElementById('typing');
			el.textContent = text;
		}
		function clearTyping() {
			document.getElementById('typing').textContent = '';
		}

		// Logout
		document.getElementById('logout').onclick = () => {
			localStorage.removeItem('token');
			window.location.href = '/index.html';
		};

		// Cargar salas al iniciar
		loadRooms();
	</script>
</body>
</html>
