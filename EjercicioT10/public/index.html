<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login - Chat en Tiempo Real</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow">
					<div class="card-body">
						<h2 class="mb-4 text-center">Chat en Tiempo Real</h2>
						<form id="loginForm">
							<div class="mb-3">
								<label for="email" class="form-label">Email</label>
								<input type="email" class="form-control" id="email" required>
							</div>
							<div class="mb-3">
								<label for="password" class="form-label">Contraseña</label>
								<input type="password" class="form-control" id="password" required>
							</div>
							<button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
						</form>
						<hr>
						<form id="registerForm">
							<div class="mb-3">
								<label for="name" class="form-label">Nombre</label>
								<input type="text" class="form-control" id="name" required>
							</div>
							<div class="mb-3">
								<label for="emailReg" class="form-label">Email</label>
								<input type="email" class="form-control" id="emailReg" required>
							</div>
							<div class="mb-3">
								<label for="passwordReg" class="form-label">Contraseña</label>
								<input type="password" class="form-control" id="passwordReg" required>
							</div>
							<button type="submit" class="btn btn-success w-100">Registrarse</button>
						</form>
						<div id="msg" class="mt-3 text-center text-danger"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
		// Login
		document.getElementById('loginForm').onsubmit = async (e) => {
			e.preventDefault();
			const email = document.getElementById('email').value;
			const password = document.getElementById('password').value;
			const res = await fetch('/api/auth/login', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ email, password })
			});
			const data = await res.json();
			if (res.ok && data.token) {
				localStorage.setItem('token', data.token);
				window.location.href = '/chat.html';
			} else {
				document.getElementById('msg').textContent = data.message || 'Error de login';
			}
		};
		// Registro
		document.getElementById('registerForm').onsubmit = async (e) => {
			e.preventDefault();
			const name = document.getElementById('name').value;
			const email = document.getElementById('emailReg').value;
			const password = document.getElementById('passwordReg').value;
			const res = await fetch('/api/auth/register', {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify({ name, email, password })
			});
			const data = await res.json();
			if (res.ok && data.token) {
				localStorage.setItem('token', data.token);
				window.location.href = '/chat.html';
			} else {
				document.getElementById('msg').textContent = data.message || 'Error de registro';
			}
		};
	</script>
</body>
</html>
